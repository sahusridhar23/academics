<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Complaint | Silicon University Complaint Portal</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="site-header">
      <a class="brand" href="index.html">
        <img
          src="sit.png"
          alt="Silicon University logo"
          class="brand-logo"
        />
        <div class="brand-text">
          <span class="brand-title">Silicon University</span>
          <span class="brand-sub">Complaint Portal</span>
        </div>
      </a>
      <nav class="site-nav">
        <a href="index.html">Dashboard</a>
        <a href="add.html" class="active">New Complaint</a>
      </nav>
    </header>

    <!-- MAIN -->
    <main class="site-main">
      <div class="form-box">
        <h2>Raise Complaint</h2>
        <p class="info">
          Fill in the details below and our team will review your complaint shortly.
        </p>

        <form id="complaintForm" novalidate>
          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter first name"
            maxlength="100"
            required
          />

          <label for="category">Category</label>
          <select id="category" name="category" required>
            <option value="">-- Select Category --</option>
            <option value="Classroom">Classroom</option>
            <option value="Hostel">Hostel</option>
            <option value="Library">Library</option>
            <option value="Cafeteria">Cafeteria</option>
            <option value="IT / Network">IT / Network</option>
            <option value="Other">Other</option>
          </select>

          <label for="title">Title</label>
          <input
            type="text"
            id="title"
            name="title"
            placeholder="Complaint title"
            maxlength="120"
            required
          />

          <label for="description">Description</label>
          <textarea
            id="description"
            name="description"
            placeholder="Briefly describe the issue"
            maxlength="1000"
            required
          ></textarea>

          <div class="form-actions">
            <button type="submit" class="btn">Submit Complaint</button>
            <button type="reset" class="btn-secondary">Reset</button>
          </div>
        </form>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <h4>2026 Silicon University | m1 complaint portal</h4>
      <p><em>&copy; All rights reserved</em></p>
    </footer>

    <!-- JS -->
    <script>
      const form = document.getElementById("complaintForm");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const payload = {
          name: form.name.value.trim(),
          category: form.category.value,
          title: form.title.value.trim(),
          description: form.description.value.trim(),
        };

        // basic client-side validation
        if (!payload.name || !payload.category || !payload.title || !payload.description) {
          alert("Please fill in all fields.");
          return;
        }

        try {
          const res = await fetch(
            "http://localhost:8080/complaintportalm1/complaints",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            },
          );

          if (!res.ok) throw new Error("Failed to submit complaint");

          alert("Complaint submitted successfully!");
          form.reset();
          window.location.href = "index.html";
        } catch (err) {
          console.error(err);
          alert("Could not submit complaint. Please try again.");
        }
      });
    </script>
  </body>
</html>
