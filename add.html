<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Complaint | Silicon University Complaint Portal</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="site-header">
      <a class="brand" href="index.html">
        <img src="sit.png" alt="Silicon University logo" class="brand-logo" />
        <div class="brand-text">
          <span class="brand-title">Silicon University</span>
          <span class="brand-sub">Complaint Portal</span>
        </div>
      </a>
      <nav class="site-nav">
        <a href="index.html">Dashboard</a>
        <a href="add.html" class="active">New Complaint</a>
      </nav>
    </header>

    <!-- MAIN -->
    <main class="site-main">
      <div class="form-box">
        <h2>Raise Complaint</h2>
        <p class="info">
          Fill in the details below and our team will review your complaint
          shortly.
        </p>

        <form id="complaintForm" novalidate>
          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter first name"
            maxlength="100"
            required
          />

          <label for="category">Category</label>
          <select id="category" name="category" required>
            <option value="">-- Select Category --</option>
            <option value="Classroom">Classroom</option>
            <option value="Hostel">Hostel</option>
            <option value="Library">Library</option>
            <option value="Cafeteria">Cafeteria</option>
            <option value="IT / Network">IT / Network</option>
            <option value="Other">Other</option>
          </select>

          <label for="title">Title</label>
          <input
            type="text"
            id="title"
            name="title"
            placeholder="Complaint title"
            maxlength="120"
            required
          />

          <label for="description">Description</label>
          <textarea
            id="description"
            name="description"
            placeholder="Briefly describe the issue"
            maxlength="1000"
            required
          ></textarea>

          <div class="form-actions">
            <button type="submit" class="btn">Submit Complaint</button>
            <button type="reset" class="btn-secondary">Reset</button>
          </div>
        </form>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <h4>2026 Silicon University | m1 complaint portal</h4>
      <p><em>&copy; All rights reserved</em></p>
    </footer>

    <!-- JS -->
    <script>
      const form = document.querySelector("form");

      form.addEventListener("submit", async (e) => {
        e.preventDefault(); // stop page reload

        try {
          // get input values
          const name = document.querySelector("#name").value;
          const category = document.querySelector("#category").value;
          const title = document.querySelector("#title").value;
          const description = document.querySelector("#description").value;

          // send POST request
          const response = await fetch(
            "http://localhost:8080/complaintportalm1/addComplaint",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/x-www-form-urlencoded",
              },
              body: new URLSearchParams({
                name: name,
                category: category,
                title: title,
                description: description,
              }),
            },
          );

          const data = await response.json();
          console.log("Added:", data);

          // success message using DOM
          const msg = document.createElement("p");
          msg.textContent = "Complaint submitted successfully!";
          msg.style.color = "green";

          form.appendChild(msg);

          // clear form
          form.reset();
        } catch (error) {
          console.error("Error submitting complaint:", error);
        }
      });
    </script>
  </body>
</html>
